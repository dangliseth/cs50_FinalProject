{% extends "base.html" %}

{% block title %} | Add a Student{% endblock %}

{% block body %}
    <div class="card card-shadow pt-5">
        <div class="card-header d-flex align-items-center">
            <h5 class="card-title mx-auto"><i class="fa-solid fa-book-open-reader fa-lg"></i> New Student's Information</h5>
        </div>
        <div class="card-body">
            <form action="{{ url_for('admin.add_student') }}" method="post" class="g-4 align-items-center">
                {% for col in students.__table__.columns %}
                    {% if col.name != "id" %}
                        <div class="form-floating my-2 position-relative">
                                <input type="text" 
                                    id="{{ col.name }}" 
                                    name="{{ col.name }}" 
                                    class="form-control" 
                                    placeholder="name123"
                                    {% if not col.nullable %}required{% endif %}>
                                <label for="{{ col.name }}">{{ col.name | humanize }}</label>
                                {% if not col.nullable %}
                                    <span id="{{ col.name }}HelpInline" class="position-absolute top-50 end-0 translate-middle-y me-3 text-danger">
                                        <i class="fa-solid fa-asterisk fa-2xs" style="color: red;"></i>
                                    </span>
                                {% endif %}
                            </div>
                    {% endif %}
                {% endfor %}
                <button type="submit" class="btn btn-primary mt-2 position-relative bottom-0 start-50 translate-middle-x">Register Student</button>
            </form>
        </div>
    </div>
{% endblock %}
