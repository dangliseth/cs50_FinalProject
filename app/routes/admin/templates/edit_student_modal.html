<div class="modal fade" id="edit-studentModal" tabindex="-1" data-bs-backdrop="static" aria-labelledby="edit-studentModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content px-3 py-3">
            <div class="modal-header">
                <h5 class="modal-title">Edit Student #{{ student.id }}</h5>
                <p class="text-muted fs-6">Middle name can be removed by clicking "Edit" then leaving it blank!</p>
                <button type="button" class="btn btn-danger btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="edit-studentBody">
                <form action="{{ url_for('admin.edit_student', student_id=student.id) }}" method="post" id="edit-studentForm">
                    {% for col in Students.__table__.columns %}
                        {% if not col.primary_key and not col.foreign_keys %}
                            <div class="mb-2">
                                <label for="{{ col.name }}" class="form-label">{{ col.name | humanize }}</label>
                                <button type="button" class="btn btn-outline-primary btn-sm ms-1 edit-btn">
                                    <i class="fa-regular fa-pen-to-square"></i>Edit</button>
                                <input type="text" 
                                    id="{{ col.name }}" 
                                    name="{{ col.name }}" 
                                    class="form-control" 
                                    placeholder="{{ student | attr(col.name) }}" disabled>
                            </div>
                        {% endif %}
                    {% endfor %}
                    <button type="submit" class="btn btn-primary mt-2 position-relative bottom-0 start-50 translate-middle-x">Submit</button>
                </form>
            </div>
        </div>
    </div>
</div>
